<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sovka — coming soon</title>
<style>
  *{margin:0;box-sizing:border-box}
  body{min-height:100vh;display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:radial-gradient(120% 120% at 20% 0%,#7B4DFF 0%,#4A1FBF 55%,#2A0F6E 100%);color:#fff;text-align:center;padding:24px}
  .badge{display:inline-block;padding:8px 16px;border:1px solid rgba(255,255,255,.25);border-radius:999px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;backdrop-filter:blur(8px);background:rgba(255,255,255,.08)}
  h1{font-size:clamp(40px,12vw,84px);font-weight:800;letter-spacing:-.03em;margin:24px 0 12px}
  p{font-size:18px;opacity:.85;max-width:420px;margin:0 auto}
  .dot{height:8px;width:8px;border-radius:50%;background:#3DDc97;display:inline-block;margin-right:8px;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
  <main>
    <span class="badge"><span class="dot"></span>Deploy test</span>
    <h1>Sovka</h1>
    <p>Stores for sellers in Ghana &amp; Nigeria. If you can read this, the deploy pipeline works.</p>
  </main>
</body>
</html>
